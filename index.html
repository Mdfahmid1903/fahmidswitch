<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>light switch</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Js Practises</h1>
    <div class="container"><i class="fa-solid fa-fan"></i></div>
    <div class="lights">
      <div class="red"></div>
      <div class="yellow"></div>
      <div class="green"></div>
    </div>

    <form>
      <label for="name">Name*</label>
      <input type="text" id="name" placeholder="Enter your name" required />
      <button type="submit" class="submit">Submit</button>
    </form>

    <div class="heart-container">
      <button class="heart"><i class="fa-solid fa-heart"></i></button>
      <span class="like-count">0</span>
    </div>
    <button class="switch">🌙</button>
    <button class="switch2">🔄</button>
    <button class="switch3">💡</button>

    <div class="count-container">
      <button class="switch4">+1</button>
      <span class="count">0</span>
      <button class="reset-button">0</button>
    </div>
    <div class="color-container">
      <button class="switch5">🌞</button>
      <p class="rgb">color</p>
    </div>

    <form action="#">
      <label for="text">text</label>
      <textarea name="text" id="text" rows="20" cols="50"></textarea>
      <p class="char" style="color: green">280 left</p>
    </form>

    <script src="script.js"></script>
  </body>
</html>
